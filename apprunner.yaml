version: 1.0
runtime: nodejs22
build:
  commands:
    build:
      - cd server && npm ci --omit=dev
run:
  command: node server/server.js
  network:
    port: 8080
    env: PORT
  env:
    - name: NODE_ENV
      value: production
    - name: API_PREFIX
      value: /api/v1
    - name: LOG_LEVEL
      value: info
    - name: DB_PORT
      value: "3306"
    - name: DB_LOGGING
      value: "false"
    - name: DB_POOL_MAX
      value: "20"
    - name: DB_POOL_MIN
      value: "0"
    - name: DB_POOL_ACQUIRE
      value: "30000"
    - name: DB_POOL_IDLE
      value: "10000"
    - name: RATE_LIMIT_WINDOW
      value: "15"
    - name: RATE_LIMIT_MAX
      value: "500"
    - name: JWT_EXPIRES_IN
      value: 24h
    - name: JWT_REFRESH_EXPIRES_IN
      value: 7d
    - name: MAX_FILE_SIZE
      value: "10485760"
    - name: ALLOWED_EXTENSIONS
      value: .pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png
