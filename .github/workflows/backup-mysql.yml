name: Backup MySQL → Google Drive

on:
  schedule:
    # 2:00 AM hora Colombia (UTC-5) = 7:00 AM UTC
    - cron: '0 7 * * *'
  workflow_dispatch: # Permite ejecutar manualmente desde GitHub

jobs:
  backup:
    name: Dump y subir a Google Drive
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Instalar cliente MySQL
        run: sudo apt-get install -y mysql-client

      - name: Generar dump de la base de datos
        id: dump
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          INICIO=$(date +%s)
          FECHA=$(date +'%Y-%m-%d')
          HORA=$(date +'%H-%M')
          ARCHIVO="istho_crm_backup_${FECHA}_${HORA}.sql"

          echo "Iniciando backup de $DB_NAME..."

          mysqldump \
            -h "$DB_HOST" \
            -P "${DB_PORT:-3306}" \
            -u "$DB_USER" \
            -p"$DB_PASS" \
            "$DB_NAME" \
            --single-transaction \
            --routines \
            --triggers \
            --set-gtid-purged=OFF \
            > "$ARCHIVO"

          echo "Dump completado. Comprimiendo..."
          gzip -9 "$ARCHIVO"
          ARCHIVO_GZ="${ARCHIVO}.gz"

          FIN=$(date +%s)
          DURACION=$((FIN - INICIO))
          TAMANO=$(stat -c%s "$ARCHIVO_GZ")

          echo "Archivo: $ARCHIVO_GZ | Tamaño: $(du -sh $ARCHIVO_GZ | cut -f1) | Duración: ${DURACION}s"

          echo "BACKUP_FILE=$ARCHIVO_GZ" >> $GITHUB_ENV
          echo "FECHA=$FECHA"           >> $GITHUB_ENV
          echo "DURACION=$DURACION"     >> $GITHUB_ENV
          echo "TAMANO=$TAMANO"         >> $GITHUB_ENV

      - name: Instalar rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configurar rclone con Google Drive
        env:
          GDRIVE_SA: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$GDRIVE_SA" > /tmp/gdrive-sa.json

          cat > ~/.config/rclone/rclone.conf << EOF
          [gdrive]
          type = drive
          service_account_file = /tmp/gdrive-sa.json
          root_folder_id = ${GDRIVE_FOLDER_ID}
          EOF

      - name: Subir backup a Google Drive
        run: |
          rclone copy "${{ env.BACKUP_FILE }}" gdrive: --progress
          echo "Backup subido: ${{ env.BACKUP_FILE }}"

      - name: Eliminar backups con más de 30 días en Google Drive
        run: |
          rclone delete gdrive: \
            --min-age 30d \
            --include "istho_crm_backup_*.sql.gz" \
            --verbose || true

      - name: Registrar backup exitoso en el CRM
        if: success()
        env:
          CRM_API_URL: ${{ secrets.CRM_API_URL }}
          BACKUP_API_KEY: ${{ secrets.BACKUP_API_KEY }}
        run: |
          curl -s -X POST "${CRM_API_URL}/backup/registrar" \
            -H "Content-Type: application/json" \
            -H "X-Backup-Token: ${BACKUP_API_KEY}" \
            -d "{
              \"archivo\": \"${{ env.BACKUP_FILE }}\",
              \"tamano_bytes\": ${{ env.TAMANO }},
              \"estado\": \"exitoso\",
              \"duracion_segundos\": ${{ env.DURACION }},
              \"origen\": \"automatico\"
            }" || echo "Advertencia: no se pudo registrar en el CRM"

      - name: Limpiar archivos temporales
        if: always()
        run: rm -f "${{ env.BACKUP_FILE }}" /tmp/gdrive-sa.json || true

      # ─────────────────────────────────────────────────────────────
      # MANEJO DE FALLOS: registrar error + enviar email de alerta
      # ─────────────────────────────────────────────────────────────

      - name: Registrar backup fallido en el CRM
        if: failure()
        env:
          CRM_API_URL: ${{ secrets.CRM_API_URL }}
          BACKUP_API_KEY: ${{ secrets.BACKUP_API_KEY }}
        run: |
          curl -s -X POST "${CRM_API_URL}/backup/registrar" \
            -H "Content-Type: application/json" \
            -H "X-Backup-Token: ${BACKUP_API_KEY}" \
            -d "{
              \"estado\": \"fallido\",
              \"error_mensaje\": \"Fallo en GitHub Actions — revisar logs en https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"origen\": \"automatico\"
            }" || true

      - name: Enviar alerta de fallo por email
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          BACKUP_ALERT_EMAIL: ${{ secrets.BACKUP_ALERT_EMAIL }}
          BACKUP_FROM_EMAIL: ${{ secrets.BACKUP_FROM_EMAIL }}
        run: |
          LOGS_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          FECHA_HORA=$(date +'%d/%m/%Y %H:%M')

          curl -s -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"CenthriX CRM <${BACKUP_FROM_EMAIL}>\",
              \"to\": [\"${BACKUP_ALERT_EMAIL}\"],
              \"subject\": \"Alerta: Backup MySQL fallido — ${FECHA_HORA}\",
              \"html\": \"<div style='font-family:sans-serif;max-width:600px;margin:0 auto'><div style='background:#E74C3C;padding:20px;border-radius:8px 8px 0 0'><h2 style='color:white;margin:0'>Backup Fallido</h2></div><div style='background:#f8f8f8;padding:24px;border-radius:0 0 8px 8px;border:1px solid #eee'><p style='color:#333'>El backup automático de la base de datos <strong>ISTHO CRM</strong> falló el <strong>${FECHA_HORA}</strong>.</p><p style='color:#666'>La base de datos <strong>no fue respaldada</strong> en este ciclo. Es necesario revisar el error y ejecutar un backup manual desde el panel de administración.</p><a href='${LOGS_URL}' style='display:inline-block;background:#E74C3C;color:white;padding:12px 24px;border-radius:6px;text-decoration:none;font-weight:bold;margin:16px 0'>Ver logs del error</a><hr style='border:none;border-top:1px solid #eee;margin:16px 0'><p style='color:#999;font-size:12px'>ISTHO CRM · CenthriX · Sistema de Gestión Logística</p></div></div>\"
            }"
